<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>ccgauge</title>
  <defs>
    <linearGradient id="ccg-bg" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square with Indigo-400 → Indigo-600 vertical gradient. -->
  <rect width="64" height="64" rx="14" fill="url(#ccg-bg)"/>
  <!-- Dial track: full 180° arc, dim, gives the gauge its baseline. -->
  <path d="M14 41 A18 18 0 0 1 50 41" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <!-- Progress arc: filled portion ending at 60° elevation (the same point the needle reaches). -->
  <path d="M14 41 A18 18 0 0 1 41 25.4" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <!-- Needle: from pivot to the progress-arc tip on the dial rim. -->
  <line x1="32" y1="41" x2="41" y2="25.4" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <!-- Donut pivot: white ring + Indigo-600 core. -->
  <circle cx="32" cy="41" r="4" fill="#FFFFFF"/>
  <circle cx="32" cy="41" r="1.6" fill="#4F46E5"/>
</svg>
